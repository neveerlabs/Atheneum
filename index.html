<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Atheneum — Perpustakaan Digital</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container" id="appContainer">
    <div class="header-wrapper" id="headerWrapper">
      <div class="header">
        <div class="header-left">
          <span class="header-greeting">Perpustakaan</span>
          <span class="header-title">Koleksi Buku</span>
        </div>
        <div class="header-actions">
          <div class="icon-btn" id="btnBookmarks" onclick="navigateTo('bookmarks')">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
            <span class="badge" id="bookmarkBadge" style="display:none;"></span>
          </div>
        </div>
      </div>
      <div class="search-container">
        <div class="search-wrapper">
          <input type="text" class="search-input" id="searchInput" placeholder="Cari judul atau penulis..." oninput="handleSearch(this.value)">
          <span class="search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <button class="clear-search" id="clearSearch" onclick="clearSearch()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="category-scroll" id="categoryScroll"></div>
    </div>
    <div class="page active" id="pageLibrary">
      <div class="books-grid" id="booksGrid"></div>
      <div class="no-results" id="noResults" style="display:none;">
        <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="no-results-text">Buku tidak ditemukan</span>
        <span class="no-results-sub">Coba kata kunci lain atau ubah kategori</span>
      </div>
    </div>
    <div class="page reader-page" id="pageReader">
      <div class="reader-header">
        <div class="reader-back" onclick="closeReader()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="reader-title-area">
          <div class="reader-book-title" id="readerTitle">Judul Buku</div>
          <div class="reader-chapter" id="readerChapter">Halaman 1</div>
        </div>
        <div class="reader-actions">
          <button class="reader-action-btn" id="readerBookmarkBtn" onclick="toggleReaderBookmark()">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
          </button>
        </div>
      </div>
      <div class="reader-content" id="readerContent">
        <div class="reader-text" id="readerText"></div>
      </div>
      <div class="reader-footer">
        <div class="reader-progress-bar">
          <div class="reader-progress-fill" id="readerProgressFill"></div>
        </div>
        <div class="reader-progress-info">
          <span id="readerPageInfo">Halaman 1 dari 1</span>
          <span id="readerPercent">0%</span>
        </div>
        <div class="reader-nav-buttons">
          <button class="reader-nav-btn" id="btnPrevPage" onclick="prevPage()" disabled>← Sebelumnya</button>
          <button class="reader-nav-btn" id="btnNextPage" onclick="nextPage()">Selanjutnya →</button>
        </div>
      </div>
    </div>
    <div class="page bookmarks-page" id="pageBookmarks">
      <div class="reader-header">
        <div class="reader-back" onclick="navigateTo('library')">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="reader-title-area">
          <div class="reader-book-title">Bookmark</div>
          <div class="reader-chapter">Buku yang disimpan</div>
        </div>
        <div style="width:38px;"></div>
      </div>
      <div class="bookmarks-list" id="bookmarksList"></div>
      <div class="no-results" id="noBookmarks" style="display:none;">
        <svg class="no-results-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        <span class="no-results-text">Belum ada bookmark</span>
        <span class="no-results-sub">Simpan buku favoritmu saat membaca</span>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-item active" data-page="library" onclick="navigateTo('library')">
        <div class="nav-indicator"></div>
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="nav-label">Koleksi</span>
      </div>
      <div class="nav-item" data-page="bookmarks" onclick="navigateTo('bookmarks')">
        <div class="nav-indicator"></div>
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        <span class="nav-label">Bookmark</span>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
